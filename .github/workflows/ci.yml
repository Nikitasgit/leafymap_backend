name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  JWT_SECRET: test-secret

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Knip
        run: npm run knip

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration
